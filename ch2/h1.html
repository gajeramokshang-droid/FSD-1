<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
</head>
<body>
     <p id="id"></p>
     <script>
          setTimeout(myfun , 5000); // Runs once after 5 seconds

          setInterval(() => {       // Runs repeatedly every 3 seconds
               document.getElementById("id").innerHTML += "<br>AFTER 3 SEC";
          }, 3000);

          function myfun() {
               document.getElementById("id").innerHTML = "HTML";
          }
     </script>
</body>
</html>
