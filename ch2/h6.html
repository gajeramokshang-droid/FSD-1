<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="id1">Jesus Christ</p>
    <button onclick="incre()">Increase</button>
    <button onclick="decre()">Decrease</button>
    <button onclick="stop()">Stop</button>
    <script>
           let x1=50;
           function fun1(x1){
            document.getElementById(id1).style.fontSize=x1+"px"
           }
        function incre(){
          test=  setInterval(()=>{
                document.getElementById("id1").style.fontSize=x1+"px";
                x1++
            },100);
        }

        function decre(){
          test=setInterval(()=>{
              if(x1>20){
                fun1(--x1);
            }
          },100);
          
        }

        function stop(){
            clearInterval(test);
        }
    </script>

</body>
</html>
