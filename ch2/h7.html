<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
</head>
<body>
    <script>
        function jesus(){
            console.log("Stop1 Jesus");
            setTimeout(() => {
                cb("Salvation")
            }, 2000);
            console.log("Stop2 Christ")
        }
        function cb(x){
            console.log(x);
        }
        jesus()
    </script>
</body>
</html>
